<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{% block title %}GallerAI{% endblock %}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #0f0f0f;
    }
    
    .content {
      background-color: #0f0f0f;
      padding: 48px 40px;
    }
    
    @media (prefers-color-scheme: light) {
      body { background-color: #fafafa !important; }
      .container { background-color: #fafafa !important; }
      .content { background-color: #ffffff !important; border: 1px solid #e5e5e5; }
      .text-primary { color: #111111 !important; }
      .text-secondary { color: #666666 !important; }
      .text-tertiary { color: #999999 !important; }
    }
    
    @media (prefers-color-scheme: dark) {
      body { background-color: #0f0f0f !important; }
      .container { background-color: #0f0f0f !important; }
      .content { background-color: #0f0f0f !important; border: 1px solid #2a2a2a; }
      .text-primary { color: #ffffff !important; }
      .text-secondary { color: #a0a0a0 !important; }
      .text-tertiary { color: #666666 !important; }
    }
    
    @media screen and (max-width: 600px) {
      .content { padding: 32px 24px !important; }
      .heading { font-size: 24px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#0f0f0f;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" class="container">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <!-- Logo -->
        <table role="presentation" cellpadding="0" cellspacing="0" style="margin-bottom: 32px;">
          <tr>
            <td>
              <a href="{{ base_url|default('https://gallerai.app') }}" style="text-decoration:none; display:inline-flex; align-items:center; gap:8px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="width:28px; height:28px; background-color:#ff6b6b; border-radius:5px; text-align:center; vertical-align:middle;">
                      <span style="color:#ffffff; font-size:16px; font-weight:bold; line-height:28px;">✓</span>
                    </td>
                  </tr>
                </table>
                <span style="font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:20px; font-weight:600; color:#ffffff; letter-spacing:-0.02em;" class="text-primary">
                  Galler<em style="font-style:italic; color:#ff6b6b;">AI</em>
                </span>
              </a>
            </td>
          </tr>
        </table>

        <!-- Main Content Card -->
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:480px; background-color:#0f0f0f; border:1px solid #2a2a2a; border-radius:12px; overflow:hidden;" class="content">
          <tr>
            <td style="padding:48px 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
        </table>

        <!-- Footer -->
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:480px; margin-top:32px;">
          <tr>
            <td style="text-align:center; padding:0 20px;">
              <p style="font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:12px; line-height:1.6; color:#666666; margin:0 0 8px 0;" class="text-tertiary">
                You're receiving this email because you have an account with GallerAI.
              </p>
              <p style="font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:12px; line-height:1.6; color:#666666; margin:0;" class="text-tertiary">
                © {{ current_year|default('2026') }} GallerAI. All rights reserved.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
